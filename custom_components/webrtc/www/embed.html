<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>WebRTC Camera</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #1c1c1c;
        }

        html, body, webrtc-camera {
            height: 100%;
            width: 100%;
        }

        ha-card {
            display: block;
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1c1c1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash svg {
            width: 120px;
            height: 120px;
            animation: pulse 2s ease-in-out infinite;
        }

        #splash .text {
            color: #9e9e9e;
            font-size: 16px;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
<div id="splash">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
        <path d="M240 224.762 218.667 224.762 218.667 103.881 120 5.214 21.333 103.881 21.333 224.762 0 224.762 0 93.714 120-26.453 240 93.714Z" fill="#41BDF5"/>
        <path d="M69.333 178.095 69.333 131.429 120 80.762 170.667 131.429 170.667 178.095 138.667 178.095 138.667 144.762 101.333 144.762 101.333 178.095Z" fill="#41BDF5"/>
    </svg>
    <div class="text">CONNECTING</div>
</div>
<script type="module" src="/webrtc/webrtc-camera.js"></script>
<script type="module">
    const config = {};
    for (const [k, v] of new URLSearchParams(location.search)) {
        if (v === 'true') config[k] = true;
        else if (v === 'false') config[k] = false;
        else config[k] = v;
    }

    const card = document.createElement('webrtc-camera');
    card.setConfig(config);
    card.hass = {
        callWS: () => new Promise(resolve => {
            resolve('');
        }),
        hassUrl: () => location.origin + '/api/webrtc/ws?embed=1'
    };

    document.body.appendChild(card);

    // --- Splash screen dismissal logic ---
    const splash = document.getElementById('splash');
    let splashDismissed = false;

    let posterCheck = null;

    function hideSplash() {
        if (splashDismissed) return;
        splashDismissed = true;
        clearInterval(posterCheck);
        if (splash && splash.parentNode) {
            splash.classList.add('hidden');
            // Wait slightly longer than the 0.5s CSS transition before removing
            setTimeout(() => {
                if (splash.parentNode) splash.remove();
            }, 600);
        }
    }

    // Poll for the video element inside the shadow DOM since
    // MutationObserver cannot see inside shadow roots
    const pollInterval = setInterval(() => {
        if (splashDismissed) {
            clearInterval(pollInterval);
            return;
        }

        // The video element lives inside the webrtc-camera shadow DOM
        const shadow = card.shadowRoot;
        const video = shadow
            ? shadow.querySelector('video')
            : card.querySelector('video');

        if (!video) return;

        // Found the video element - attach listeners and stop polling
        clearInterval(pollInterval);

        // Listen for multiple events - different stream modes fire different events
        const events = ['playing', 'loadeddata', 'canplay'];
        events.forEach(evt => {
            video.addEventListener(evt, () => hideSplash(), {once: true});
        });

        // Also check if video is already playing (race condition)
        // readyState >= 2 means HAVE_CURRENT_DATA or better (data available to play)
        if (video.readyState >= 2 || !video.paused) {
            hideSplash();
        }

        // For MJPEG mode: the video gets a poster data URL instead of playing.
        // Poll for poster changes as an additional detection method.
        posterCheck = setInterval(() => {
            if (splashDismissed) {
                clearInterval(posterCheck);
                return;
            }
            if (video.poster && video.poster.startsWith('data:')) {
                hideSplash();
            }
        }, 500);

        // Clear poster check after 15s to avoid leaking if neither video events
        // nor poster changes have triggered hideSplash by then
        setTimeout(() => clearInterval(posterCheck), 15000);

    }, 100); // Check every 100ms for the video element

    // Fallback: always hide after 8 seconds no matter what
    setTimeout(() => {
        clearInterval(pollInterval);
        hideSplash();
    }, 8000);
</script>
</body>
</html>
