<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>WebRTC Camera</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #1c1c1c;
        }

        html, body, webrtc-camera {
            height: 100%;
            width: 100%;
        }

        ha-card {
            display: block;
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1c1c1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash svg {
            width: 120px;
            height: 120px;
            animation: pulse 2s ease-in-out infinite;
        }

        #splash .text {
            color: #9e9e9e;
            font-size: 16px;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
<div id="splash">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
        <path d="M240 224.762 218.667 224.762 218.667 103.881 120 5.214 21.333 103.881 21.333 224.762 0 224.762 0 93.714 120-26.453 240 93.714Z" fill="#41BDF5"/>
        <path d="M69.333 178.095 69.333 131.429 120 80.762 170.667 131.429 170.667 178.095 138.667 178.095 138.667 144.762 101.333 144.762 101.333 178.095Z" fill="#41BDF5"/>
    </svg>
    <div class="text">CONNECTING</div>
</div>
<script type="module" src="/webrtc/webrtc-camera.js"></script>
<script type="module">
    const config = {};
    for (const [k, v] of new URLSearchParams(location.search)) {
        if (v === 'true') config[k] = true;
        else if (v === 'false') config[k] = false;
        else config[k] = v;
    }

    const card = document.createElement('webrtc-camera');
    card.setConfig(config);
    card.hass = {
        callWS: () => new Promise(resolve => {
            resolve('');
        }),
        hassUrl: () => location.origin + '/api/webrtc/ws?embed=1'
    };

    document.body.appendChild(card);

    const splash = document.getElementById('splash');

    function hideSplash() {
        if (splash && splash.parentNode) {
            splash.classList.add('hidden');
            setTimeout(() => {
                if (splash.parentNode) splash.remove();
            }, 500);
        }
    }

    const observer = new MutationObserver(() => {
        const video = document.querySelector('video');
        if (video) {
            observer.disconnect();
            const fallback = setTimeout(hideSplash, 10000);
            video.addEventListener('playing', () => {
                clearTimeout(fallback);
                hideSplash();
            }, {once: true});
        }
    });
    observer.observe(document.body, {childList: true, subtree: true});
</script>
</body>
</html>
